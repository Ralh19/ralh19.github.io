<!DOCTYPE html>
<html lang="fr-en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet" />
    <title>Épreuve E4 - Portfolio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/animations.css">
    <script src="../dist/scripts/scrollBack.js"></script>
    <link rel="icon" type="image/png" href="../images/skillsIcons/html_ico.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
</head>

<body>
    <!-- ====== HEADER ====== -->
    <header>
        <section id="hub" class="bg-dark-purple-300 h-screen w-screen">
            <div class="h-screen max-w-full ml-72 flex flex-col justify-center items-center m-0">
                <h1 class="text-white text-8xl text-shadow-pink_red_glow font-extrabold mb-1 max-lg:text-5xl max-:text-3xl">
                    ÉPREUVE E4</h1>
                <h2 class="text-white text-6xl font-extrabold text-shadow-white_glow max-lg:text-4xl max-sm:text-2xl">
                    BTS SIO SLAM</h2>
            </div>

            <span class="absolute text-white text-4xl top-5 left-4 cursor-pointer" onclick="Openbar()">
                <i class="bi bi-filter-left px-2 bg-gray-900 rounded-md"></i>
            </span>

            <!-- Sidebar with modified links -->
            <div class="sidebar fixed top-0 bottom-0 lg:left-0 left-[-300px] duration-1000
                p-2 w-[300px] overflow-y-auto text-center bg-dark-purple-200 shadow h-screen">
                <div class="text-gray-100 text-xl">
                    <div class="p-2.5 mt-1 flex items-center rounded-md flex-col">
                        <img class="3/4 mb-6 rounded-full" src="../images/photo_ralh.jpg"
                            alt="photo de Ruben Almeida Alhada">
                        <h1 class="text-shadow-white_glow text-[15px] ml-3 text-xl text-gray-200 font-bold">Ruben
                            ALMEIDA ALHADA</h1>
                        <i class="bi bi-x ml-20 cursor-pointer lg:hidden" onclick="Openbar()"></i>
                    </div>
                    <hr class="my-2 text-gray-600">

                    <!-- Navigation links -->
                    <div>
                        <a href="../index.html">
                            <div class="p-2.5 mt-2 flex items-center rounded-md px-4 duration-300 cursor-pointer hover:bg-pink-red">
                                <i class="bi bi-house-door-fill"></i>
                                <span class="text-[15px] ml-4 text-gray-200">Retour au Portfolio</span>
                            </div>
                        </a>

                        <!-- Add your E4 specific sections here -->
                        <a href="#presentation-e4">
                            <div class="p-2.5 mt-2 flex items-center rounded-md px-4 duration-300 cursor-pointer hover:bg-pink-red">
                                <i class="bi bi-bookmark-fill"></i>
                                <span class="text-[15px] ml-4 text-gray-200">Présentation E4</span>
                            </div>
                        </a>

                        <!-- Add more navigation items as needed -->
                    </div>
                </div>
            </div>
        </section>
    </header>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="ml-72 max-lg:m-0">
        <!-- == STAGE PREMIÈRE ANNÉE == -->
        <section id="stage-1" class="bg-white min-h-screen max-w-full p-16 max-lg:px-0">
            <div class="flex flex-col items-center m-auto">
                <div class="w-full">
                    <h2 class="relative text-pink-red text-4xl text-left ml-8 mt-8 font-extrabold pb-2 after:content-[''] after:absolute after:block after:w-16 after:h-[3px] after:bg-pink-red-light after:bottom-0 after:left-0">
                        Mon stage de Première Année</h2>
                </div>
                <div class="h-full w-3/5 mt-10 mx-10 max-lg:max-lg:mx-16 max-lg:h-full max-lg:w-4/5">
                    <p class="text-xl">
                        <!-- Add your first-year internship content here -->
                    </p>
                </div>
            </div>
        </section>

        <!-- == STAGE SECONDE ANNÉE == -->
        <section id="stage-2" class="bg-white min-h-screen max-w-full p-16 max-lg:px-0">
            <div class="flex flex-col items-center m-auto">
                <div class="w-full">
                    <h2 class="relative text-pink-red text-4xl text-left ml-8 mt-8 font-extrabold pb-2 after:content-[''] after:absolute after:block after:w-16 after:h-[3px] after:bg-pink-red-light after:bottom-0 after:left-0">
                        Mon stage de Seconde Année</h2>
                </div>
                <div class="h-full w-3/5 mt-10 mx-10 max-lg:max-lg:mx-16 max-lg:h-full max-lg:w-4/5">
                    <p class="text-xl">
                        <!-- Add your second-year internship content here -->
                    </p>
                </div>
            </div>
        </section>
    </main>

    <script>
        function Openbar() {
            document.querySelector('.sidebar').classList.toggle('left-[-300px]')
        }
    </script>
</body>

</html>
